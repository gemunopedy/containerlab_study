service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname R5
!
boot-start-marker
boot-end-marker
!
vrf definition clab-mgmt
 description clab-mgmt
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv6
 exit-address-family
!
no aaa new-model
!
no ip domain lookup
ip domain name lab
ip cef
login on-success log
ipv6 unicast-routing
ipv6 cef
!
memory free low-watermark processor 53878
!
spanning-tree mode rapid-pvst
!
username admin privilege 15 secret 9 $9$7mPR.NwNV5laBk$w8wUZKwemENqkk9Cm2BpLA/vf4KiRp9faJZ5lpKwRFs
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
interface Ethernet0/0
 description clab-mgmt
 vrf forwarding clab-mgmt
 ip address 172.50.0.6 255.255.255.0
 ipv6 address 2001:172:50::6/80
 no shutdown
!
interface Ethernet0/1
 ip address 192.168.56.5 255.255.255.0
 no shutdown
!
ip forward-protocol nd
!
ip http server
ip http secure-server
ip route vrf clab-mgmt 0.0.0.0 0.0.0.0 Ethernet0/0 172.50.0.1
ip ssh bulk-mode 131072
no logging btrace
ipv6 route vrf clab-mgmt ::/0 Ethernet0/0 2001:172:50::1
!
control-plane
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login local
 transport input ssh
!
end