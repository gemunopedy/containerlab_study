hostname R2
!
vrf definition clab-mgmt
 description Containerlab management VRF (DO NOT DELETE)
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv6
 exit-address-family
!
ipv6 unicast-routing
!
username admin privilege 15 password 0 admin
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet1
 description Containerlab management interface
 vrf forwarding clab-mgmt
 ip address 172.40.0.3 255.255.255.0
 negotiation auto
 ipv6 address 2001:172:40::3/80
!
interface GigabitEthernet2
 ip address 192.168.26.2 255.255.255.0
 negotiation auto
 no shutdown
!
ip route vrf clab-mgmt 0.0.0.0 0.0.0.0 172.40.0.1
ip ssh maxstartups 128
ip ssh bulk-mode 131072
ip ssh server algorithm mac hmac-sha2-512
!
ipv6 route vrf clab-mgmt ::/0 2001:172:40::1
!
line con 0
 logging synchronous
 stopbits 1
line aux 0
line vty 0 4
 logging synchronous
 login local
 transport input all
!
end