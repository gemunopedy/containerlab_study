name: mylab1

topology:
  nodes:
    R1:
      kind: cisco_xrd
      image: ios-xrd/xrd-control-plane:latest
      startup-config: configs/R1.cfg
    R2:
      kind: cisco_xrd
      image: ios-xrd/xrd-control-plane:latest
      startup-config: configs/R2.cfg
    R3:
      kind: cisco_xrd
      image: ios-xrd/xrd-control-plane:latest
      startup-config: configs/R3.cfg
    R4:
      kind: vr-csr
      image: ios-xrd/xrd-control-plane:latest
      startup-config: configs/R4.cfg
    R5:
      kind: cisco_xrd
      image: ios-xrd/xrd-control-plane:latest
      startup-config: configs/R5.cfg

  links:
    - endpoints: ["R1:Gi0/0/0/0", "R2:Gi0/0/0/0"]
    - endpoints: ["R3:Gi0/0/0/0", "R1:Gi0/0/0/1"]
    - endpoints: ["R3:Gi0/0/0/1", "R2:Gi0/0/0/1"]
