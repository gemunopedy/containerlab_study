name: mylab

mgmt:
  network: mylab_mgmt
  ipv4-subnet: 172.30.0.0/24

topology:
  nodes:
    R1:
      kind: cisco_xrd
      image: ios-xr/xrd-control-plane:latest
      startup-config: configs/R1.cfg
    R2:
      kind: cisco_xrd
      image: ios-xr/xrd-control-plane:latest
      startup-config: configs/R2.cfg

  links:
    - endpoints: ["R1:Gi0-0-0-0", "R2:Gi0-0-0-0"]
