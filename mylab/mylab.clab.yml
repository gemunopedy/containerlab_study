name: mylab

topology:
  nodes:
    R1:
      kind: cisco_xrd
      image: ios-xrd/xrd-control-plane:latest
      startup-config: configs/R1.cfg
    R2:
      kind: cisco_xrd
      image: ios-xrd/xrd-control-plane:latest
      startup-config: configs/R2.cfg
    R3:
      kind: cisco_xrd
      image: ios-xrd/xrd-control-plane:latest
      startup-config: configs/R3.cfg

  links:
    - endpoints: ["R1:Gi0-0-0-0", "R2:Gi0-0-0-0"]
    - endpoints: ["R1:Gi0-0-0-1", "R3:Gi0-0-0-0"]
    - endpoints: ["R2:Gi0-0-0-1", "R3:Gi0-0-0-1"]
