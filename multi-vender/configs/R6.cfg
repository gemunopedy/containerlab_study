hostname R6
!
interface Loopback0
   ip address 6.6.6.6/32
!
interface Management0
   ip address 172.30.0.7/24
   ipv6 address 2001:172:30::7/80
!
interface eth0
   ip address 192.168.16.6/24
   no switchport
!
interface eth1
   ip address 192.168.26.6/24
   no switchport
!
interface eth2
   ip address 192.168.36.6/24
   no switchport
!
interface eth3
   ip address 192.168.46.6/24
   no switchport
!
interface eth4
   ip address 192.168.56.6/24
   no switchport
!
ip route 0.0.0.0/0 Management0 172.30.0.1
ipv6 route ::/0 Management0 2001:172:30::1
end