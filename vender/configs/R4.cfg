system {
    host-name R4;
}
interfaces {
    lo0 { unit 0 { family inet { address 4.4.4.4/32; } } }
    fxp0 { unit 0 { family inet { address 172.30.0.5/24; } family inet6 { address 2001:172:30::5/80; } } }
    et-0/0/0 { unit 0 { family inet { address 192.168.34.4/24; } } }
    et-0/0/1 { unit 0 { family inet { address 192.168.45.4/24; } } }
}
routing-options {
    static { route 0.0.0.0/0 next-hop 172.30.0.1; }
    rib inet6.0 { static { route ::/0 next-hop 2001:172:30::1; } }
}